<div class="grid grid-cols-1 lg:grid-cols-2 gap-4">
    <!-- Sales by Region - Bar Chart -->
    <div class="rounded-lg border border-gray-200 p-6">
        <div class="mb-6">
            <h3 class="text-sm font-semibold text-slate-900">Sales by Region</h3>
            <p class="text-xs text-slate-400 mt-0.5">Revenue distribution across regions</p>
        </div>
        <div class="relative" style="height: 240px;">
            <canvas id="regionChart"></canvas>
        </div>
    </div>

    <!-- Sales by Category - Pie Chart -->
    <div class="rounded-lg border border-gray-200 p-6">
        <div class="mb-6">
            <h3 class="text-sm font-semibold text-slate-900">Sales by Category</h3>
            <p class="text-xs text-slate-400 mt-0.5">Revenue breakdown by product category</p>
        </div>
        <div class="relative" style="height: 240px;">
            <canvas id="categoryChart"></canvas>
        </div>
    </div>
</div>

<script>
(function() {
    const chartColors = ['#3b82f6', '#6366f1', '#8b5cf6', '#f59e0b', '#10b981'];

    // Region Bar Chart
    const regionCtx = document.getElementById('regionChart');
    if (regionCtx) {
        const existingRegion = Chart.getChart(regionCtx);
        if (existingRegion) existingRegion.destroy();

        const regionLabels = {{ region_labels_json|safe }};
        const regionData = {{ region_data_json|safe }};

        new Chart(regionCtx, {
            type: 'bar',
            data: {
                labels: regionLabels,
                datasets: [{
                    label: 'Revenue',
                    data: regionData,
                    backgroundColor: chartColors.map(c => c + '22'),
                    borderColor: chartColors,
                    borderWidth: 1.5,
                    borderRadius: 4,
                    barPercentage: 0.6,
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                indexAxis: 'y',
                plugins: {
                    legend: { display: false },
                    tooltip: {
                        backgroundColor: '#1e293b',
                        titleFont: { size: 11, family: 'Inter' },
                        bodyFont: { size: 11, family: 'Inter' },
                        padding: 10,
                        cornerRadius: 6,
                        callbacks: {
                            label: function(ctx) {
                                return ' $' + ctx.parsed.x.toLocaleString();
                            }
                        }
                    }
                },
                scales: {
                    x: {
                        grid: { color: '#f1f5f9', drawBorder: false },
                        ticks: {
                            font: { size: 10, family: 'Inter' },
                            color: '#cbd5e1',
                            callback: function(v) { return '$' + (v / 1000).toFixed(0) + 'k'; },
                        },
                        border: { display: false },
                    },
                    y: {
                        grid: { display: false },
                        ticks: {
                            font: { size: 11, family: 'Inter' },
                            color: '#64748b',
                        },
                        border: { display: false },
                    }
                }
            }
        });
    }

    // Category Pie Chart
    const catCtx = document.getElementById('categoryChart');
    if (catCtx) {
        const existingCat = Chart.getChart(catCtx);
        if (existingCat) existingCat.destroy();

        const categoryLabels = {{ category_labels_json|safe }};
        const categoryData = {{ category_data_json|safe }};

        new Chart(catCtx, {
            type: 'doughnut',
            data: {
                labels: categoryLabels,
                datasets: [{
                    data: categoryData,
                    backgroundColor: chartColors,
                    borderWidth: 0,
                    hoverOffset: 4,
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                cutout: '65%',
                plugins: {
                    legend: {
                        position: 'right',
                        labels: {
                            boxWidth: 8,
                            boxHeight: 8,
                            usePointStyle: true,
                            pointStyle: 'circle',
                            font: { size: 11, family: 'Inter' },
                            color: '#64748b',
                            padding: 12,
                        }
                    },
                    tooltip: {
                        backgroundColor: '#1e293b',
                        titleFont: { size: 11, family: 'Inter' },
                        bodyFont: { size: 11, family: 'Inter' },
                        padding: 10,
                        cornerRadius: 6,
                        callbacks: {
                            label: function(ctx) {
                                const total = ctx.dataset.data.reduce((a, b) => a + b, 0);
                                const pct = ((ctx.parsed / total) * 100).toFixed(1);
                                return ' $' + ctx.parsed.toLocaleString() + ' (' + pct + '%)';
                            }
                        }
                    }
                }
            }
        });
    }
})();
</script>
