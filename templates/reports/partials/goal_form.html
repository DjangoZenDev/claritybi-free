<form hx-post="{% url 'reports:goal_save' %}"
      hx-target="#goals-grid"
      hx-swap="innerHTML"
      class="space-y-4"
      x-ref="goalForm">
    {% csrf_token %}
    <input type="hidden" name="goal_id" :value="editGoalId || ''">

    <div>
        <label class="block text-xs font-medium text-slate-600 mb-1">Goal Name</label>
        <input type="text" name="name" required
               :value="editGoalData.name || ''"
               placeholder="e.g., Reach $1M ARR"
               class="w-full px-3 py-2 border border-gray-200 rounded-lg text-sm focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition">
    </div>

    <div>
        <label class="block text-xs font-medium text-slate-600 mb-1">Description</label>
        <textarea name="description" rows="2"
                  :value="editGoalData.description || ''"
                  placeholder="Brief description of this goal"
                  class="w-full px-3 py-2 border border-gray-200 rounded-lg text-sm focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition resize-none"></textarea>
    </div>

    <div class="grid grid-cols-2 gap-3">
        <div>
            <label class="block text-xs font-medium text-slate-600 mb-1">Target Value</label>
            <input type="number" name="target_value" required step="0.01" min="0"
                   :value="editGoalData.target_value || ''"
                   placeholder="100000"
                   class="w-full px-3 py-2 border border-gray-200 rounded-lg text-sm focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition">
        </div>
        <div>
            <label class="block text-xs font-medium text-slate-600 mb-1">Current Value</label>
            <input type="number" name="current_value" step="0.01" min="0"
                   :value="editGoalData.current_value || '0'"
                   placeholder="0"
                   class="w-full px-3 py-2 border border-gray-200 rounded-lg text-sm focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition">
        </div>
    </div>

    <div class="grid grid-cols-2 gap-3">
        <div>
            <label class="block text-xs font-medium text-slate-600 mb-1">Unit</label>
            <input type="text" name="unit"
                   :value="editGoalData.unit || ''"
                   placeholder="e.g., $, %, users"
                   class="w-full px-3 py-2 border border-gray-200 rounded-lg text-sm focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition">
        </div>
        <div>
            <label class="block text-xs font-medium text-slate-600 mb-1">Category</label>
            <select name="category"
                    :value="editGoalData.category || 'revenue'"
                    class="w-full px-3 py-2 border border-gray-200 rounded-lg text-sm focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition bg-white">
                <option value="revenue">Revenue</option>
                <option value="growth">Growth</option>
                <option value="customers">Customers</option>
                <option value="efficiency">Efficiency</option>
                <option value="product">Product</option>
            </select>
        </div>
    </div>

    <div>
        <label class="block text-xs font-medium text-slate-600 mb-1">Deadline</label>
        <input type="date" name="deadline"
               :value="editGoalData.deadline || ''"
               class="w-full px-3 py-2 border border-gray-200 rounded-lg text-sm focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition">
    </div>

    <div class="flex items-center justify-end gap-2 pt-2">
        <button type="button" @click="showModal = false"
                class="px-4 py-2 text-sm font-medium text-slate-600 hover:bg-slate-50 rounded-lg transition-colors">
            Cancel
        </button>
        <button type="submit" @click="setTimeout(() => showModal = false, 200)"
                class="px-4 py-2 text-sm font-medium text-white bg-blue-500 hover:bg-blue-600 rounded-lg transition-colors">
            <span x-text="editGoalId ? 'Update Goal' : 'Create Goal'"></span>
        </button>
    </div>
</form>
