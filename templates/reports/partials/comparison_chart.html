<div class="rounded-lg border border-gray-200 p-6" x-data="{ showPrev: true }">
    <div class="flex items-center justify-between mb-6">
        <div>
            <h3 class="text-sm font-semibold text-slate-900">This Period vs Previous</h3>
            <p class="text-xs text-slate-400 mt-0.5">Revenue comparison across periods</p>
        </div>
        <button @click="showPrev = !showPrev; toggleComparison(showPrev)"
                :class="showPrev ? 'bg-slate-100 text-slate-700' : 'text-slate-400 hover:text-slate-600'"
                class="inline-flex items-center gap-1 px-2.5 py-1 text-xs font-medium rounded-md border border-gray-200 transition-colors no-print">
            <svg class="w-3 h-3" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" d="M2.036 12.322a1.012 1.012 0 010-.639C3.423 7.51 7.36 4.5 12 4.5c4.638 0 8.573 3.007 9.963 7.178.07.207.07.431 0 .639C20.577 16.49 16.64 19.5 12 19.5c-4.638 0-8.573-3.007-9.963-7.178z" />
                <path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
            </svg>
            <span x-text="showPrev ? 'Hide Previous' : 'Show Previous'"></span>
        </button>
    </div>
    <div class="relative" style="height: 260px;">
        <canvas id="comparisonChart"></canvas>
    </div>
</div>

<script>
(function() {
    var ctx = document.getElementById('comparisonChart');
    if (!ctx) return;

    var existingChart = Chart.getChart(ctx);
    if (existingChart) existingChart.destroy();

    var currentLabels = {{ current_labels_json|safe }};
    var currentData = {{ current_data_json|safe }};
    var previousData = {{ previous_data_json|safe }};

    var chart = new Chart(ctx, {
        type: 'line',
        data: {
            labels: currentLabels,
            datasets: [
                {
                    label: 'Current Period',
                    data: currentData,
                    borderColor: '#3b82f6',
                    backgroundColor: 'rgba(59, 130, 246, 0.05)',
                    fill: true,
                    tension: 0.3,
                    borderWidth: 2,
                    pointRadius: 0,
                    pointHoverRadius: 4,
                    pointHoverBackgroundColor: '#3b82f6',
                },
                {
                    label: 'Previous Period',
                    data: previousData,
                    borderColor: '#94a3b8',
                    backgroundColor: 'transparent',
                    borderWidth: 1.5,
                    borderDash: [6, 4],
                    tension: 0.3,
                    pointRadius: 0,
                    pointHoverRadius: 4,
                    pointHoverBackgroundColor: '#94a3b8',
                }
            ]
        },
        options: {
            responsive: true,
            maintainAspectRatio: false,
            interaction: {
                mode: 'index',
                intersect: false,
            },
            plugins: {
                legend: {
                    display: true,
                    position: 'top',
                    align: 'end',
                    labels: {
                        boxWidth: 8,
                        boxHeight: 8,
                        usePointStyle: true,
                        pointStyle: 'circle',
                        font: { size: 11, family: 'Inter' },
                        color: '#94a3b8',
                        padding: 16,
                    }
                },
                tooltip: {
                    backgroundColor: '#1e293b',
                    titleFont: { size: 11, family: 'Inter' },
                    bodyFont: { size: 11, family: 'Inter' },
                    padding: 10,
                    cornerRadius: 6,
                    displayColors: true,
                    boxWidth: 8,
                    boxHeight: 8,
                    usePointStyle: true,
                    callbacks: {
                        label: function(context) {
                            return ' ' + context.dataset.label + ': $' + context.parsed.y.toLocaleString();
                        }
                    }
                }
            },
            scales: {
                x: {
                    grid: { display: false },
                    ticks: {
                        font: { size: 10, family: 'Inter' },
                        color: '#cbd5e1',
                        maxTicksLimit: 12,
                    },
                    border: { display: false },
                },
                y: {
                    grid: { color: '#f1f5f9', drawBorder: false },
                    ticks: {
                        font: { size: 10, family: 'Inter' },
                        color: '#cbd5e1',
                        callback: function(v) { return '$' + (v / 1000).toFixed(0) + 'k'; },
                    },
                    border: { display: false },
                }
            }
        }
    });

    window.toggleComparison = function(show) {
        chart.data.datasets[1].hidden = !show;
        chart.update();
    };
})();
</script>
